<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Filling Machine #1 — OEE Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;font-size:14px}
body.dark{background:#0f172a;color:#e2e8f0}
body.light{background:#f1f5f9;color:#0f172a}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;position:sticky;top:0;z-index:100}
body.dark #hdr{background:#1e293b;border-bottom:1px solid #334155}
body.light #hdr{background:#fff;border-bottom:1px solid #e2e8f0}
.logo{display:flex;align-items:center;gap:10px}
.dot{width:9px;height:9px;border-radius:50%;background:#22c55e}
.ttl{font-weight:700;font-size:15px}
.sub{font-size:12px;opacity:.5;margin-left:4px}
.ctrls{display:flex;gap:8px}
.btn{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s}
body.dark .btn{background:transparent;color:#94a3b8;border:1px solid #334155}
body.light .btn{background:transparent;color:#64748b;border:1px solid #e2e8f0}
.btn.on,.btn:hover{background:#3b82f6;color:#fff;border-color:#3b82f6}
/* Date filter active state */
.date-btn{padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s;position:relative;border:1px solid transparent}
body.dark .date-btn{background:transparent;color:#94a3b8;border-color:#334155}
body.light .date-btn{background:transparent;color:#64748b;border-color:#e2e8f0}
.date-btn:hover{color:#3b82f6;border-color:#3b82f6;background:rgba(59,130,246,.08)}
.date-btn.active{background:#3b82f6;color:#fff !important;border-color:#3b82f6;font-weight:700;box-shadow:0 0 0 3px rgba(59,130,246,.3),0 2px 6px rgba(59,130,246,.4)}
.date-btn.active::after{content:'▼';position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:#3b82f6;line-height:1}
.thm{font-size:17px;padding:4px 10px}
#main{padding:20px 24px 60px;max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:16px}
.card{border-radius:10px;padding:18px}

.sh{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.sb{width:3px;height:16px;background:#3b82f6;border-radius:2px;flex-shrink:0}
.st{font-size:14px;font-weight:600}

.kl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;opacity:.5;margin-bottom:4px}

.dates{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:4px}
.dlbl{font-size:12px;opacity:.5}

.nodata{text-align:center;padding:14px;font-style:italic;opacity:.5}
/* Gantt edit popup */
#seg-popup{position:fixed;z-index:2000;border-radius:10px;padding:14px 16px;min-width:220px;
  box-shadow:0 8px 32px rgba(0,0,0,.45);display:none;font-size:13px}
body.dark #seg-popup{background:#1e293b;border:1px solid #475569;color:#e2e8f0}
body.light #seg-popup{background:#fff;border:1px solid #cbd5e1;color:#0f172a}
.popup-title{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.06em;opacity:.5;margin-bottom:10px}

.popup-btn{display:flex;align-items:center;gap:8px;width:100%;padding:7px 10px;border-radius:6px;
  cursor:pointer;font-size:13px;font-family:inherit;border:none;text-align:left;transition:background .15s;margin-bottom:3px}

.popup-btn .dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}

  color:inherit;font-size:13px;font-family:inherit;padding:5px 8px;outline:none;width:70px}

body.light .split-input{background:#f8fafc}
.split-input:focus{border-color:#3b82f6}

.gseg.editable:hover{filter:brightness(1.2);outline:2px solid rgba(255,255,255,.4);outline-offset:-1px}
.bd-note{width:100%;background:transparent;border:none;border-bottom:1px dashed rgba(148,163,184,.3);color:inherit;font-size:12px;font-family:inherit;padding:3px 4px;outline:none;resize:none;line-height:1.4;transition:border-color .2s}

.bd-saved.show{opacity:1}
canvas{display:block}

<body class="dark">
<div id="hdr">
  <div class="logo">
    <div class="dot"></div>
    <span class="ttl">Filling Machine #1</span>
    <span class="sub">OEE Dashboard</span>
  </div>
  <div class="ctrls">
    <button class="btn on" id="bL" onclick="setView('live')">Live</button>
    <button class="btn" id="bD" onclick="setView('daily')">Daily</button>
    <button class="btn" id="bW" onclick="setView('weekly')">Weekly</button>
    <span id="liveStatus" style="display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;opacity:.85;margin-left:4px"><span id="liveDot" style="width:8px;height:8px;border-radius:50%;background:#9ca3af"></span><span id="liveStatusText">connecting…</span></span>
    <button class="btn thm" onclick="toggleTheme()">☀️</button>
  </div>
</div>
<div id="seg-popup">
  <span class="popup-close" onclick="event.stopPropagation();closeSegPopup()">✕</span>
  <div class="popup-title" id="popup-cur-label">Segment</div>
  <div class="popup-section">Reclassify as</div>
  <button class="popup-btn" onclick="reclassifySeg(1024)"><span class="dot" style="background:#dc2626"></span>Breakdown</button>
  <button class="popup-btn" onclick="reclassifySeg(2)"><span class="dot" style="background:#f59e0b"></span>Changeover</button>
  <button class="popup-btn" onclick="reclassifySeg(16)"><span class="dot" style="background:#3b82f6"></span>Planned Stop</button>
  <hr class="popup-divider">
  <div class="popup-section">Split segment</div>
  <div style="font-size:11px;opacity:.5;margin-bottom:6px">First part duration (min)</div>
  <div class="split-wrap">
    <input class="split-input" type="number" id="split-mins" min="1" placeholder="e.g. 10" style="width:70px" oninput="const s=document.getElementById('split-slider');if(s)s.value=this.value">
    <span id="split-of" style="font-size:11px;opacity:.45;white-space:nowrap">of — min total</span>
  </div>
  <div style="margin-top:6px">
    <input type="range" id="split-slider" min="1" max="100" value="50"
      style="width:100%;accent-color:#3b82f6;cursor:pointer"
      oninput="onSplitSlider(this.value)">
    <div style="display:flex;justify-content:space-between;font-size:10px;opacity:.4;margin-top:1px">
      <span>0</span><span id="split-slider-mid"></span><span id="split-slider-max"></span>
    </div>
  </div>
  <button style="width:100%;margin-top:8px;padding:7px;background:#3b82f6;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:600" onclick="splitSeg()">✂ Split</button>
  <div id="split-error" style="color:#ef4444;font-size:11px;margin-top:5px;display:none"></div>
</div>
<div id="main"></div>
<div class="tooltip" id="tip"></div>

<script>
// ═══════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════
let ROWS=[];  // populated by loadDay() / loadWeek()

function parseCSVText(text) {
  const lines = text.trim().split('\n');
  // Skip header if present
  const start = lines[0].startsWith('timestamp') ? 1 : 0;
  return lines.slice(start).map(l => {
    const p = l.trim().split(',');
    if (p.length < 7) return null;
    const [ts,g,e,d,sp,st,sk] = p;
    const row = {ts:new Date(ts.replace('T',' ')),good:+g,empty:+e,defect:+d,speed:+sp,state:+st,sku:sk.trim()};
    return isNaN(row.ts.getTime()) ? null : row;
  }).filter(Boolean);
}

// ── Embedded fallback data (May 20) ──
const FALLBACK=`2026-05-20 09:00:00,100,1,1,33,256,331TX
2026-05-20 10:00:00,400,3,2,34,256,331TX
2026-05-20 11:00:00,720,5,3,32,512,SP33
2026-05-20 12:00:00,1040,7,4,33,512,SP33
2026-05-20 13:00:00,1360,8,4,0,1024,SP33`;

// ═══════════════════════════════════════════════════════
//  PARSE + HELPERS
// ═══════════════════════════════════════════════════════
const SEEDS=[1,0.94,0.97,1.03,0.91,0.88,0.96];
const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const D=s=>document.body.classList.contains('dark');

function fT(d){return d.toTimeString().slice(0,5);}
function localDate(d){
  // Returns 'YYYY-MM-DD' in LOCAL timezone (not UTC)
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,'0');
  const dd=String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
}
function fDur(m){return`${String(Math.floor(m/60)).padStart(2,'0')}:${String(Math.round(m%60)).padStart(2,'0')}`;}
function sInfo(c){
  if([1,256].includes(c))  return{n:'Operating',   c:'#22c55e'};  // green
  if([2,512].includes(c))  return{n:'Changeover',  c:'#f59e0b'};  // amber
  if(c===16)               return{n:'Planned Stop', c:'#3b82f6'};  // blue
  if(c===128)              return{n:'Minor Stop',   c:'#a855f7'};  // purple (same as 2048)
  if(c===1024)             return{n:'Breakdown',    c:'#dc2626'};  // bright red
  if(c===2048)             return{n:'Minor Stop',   c:'#a855f7'};  // purple
  return{n:'Unknown',c:'#9ca3af'};
}

function skuRuns(rows){
  if(!rows.length)return[];
  const out=[];
  let c={sku:rows[0].sku,st:rows[0].ts,g:rows[0].good,e:rows[0].empty,d:rows[0].defect};
  for(let i=1;i<rows.length;i++){
    if(rows[i].sku!==c.sku){
      out.push({sku:c.sku,start:c.st,end:rows[i-1].ts,good:Math.max(0,rows[i-1].good-c.g),empty:Math.max(0,rows[i-1].empty-c.e),defect:Math.max(0,rows[i-1].defect-c.d)});
      c={sku:rows[i].sku,st:rows[i].ts,g:rows[i].good,e:rows[i].empty,d:rows[i].defect};
    }
  }
  const L=rows[rows.length-1];
  out.push({sku:c.sku,start:c.st,end:L.ts,good:Math.max(0,L.good-c.g),empty:Math.max(0,L.empty-c.e),defect:Math.max(0,L.defect-c.d)});
  return out.map(r=>({...r,dur:(r.end-r.start)/60000}));
}
function hourlyBars(rows){
  const m={};for(let h=0;h<24;h++)m[h]={h,g:0,e:0,d:0};
  for(let i=1;i<rows.length;i++){
    const h=rows[i].ts.getHours();
    m[h].g+=Math.max(0,rows[i].good-rows[i-1].good);
    m[h].e+=Math.max(0,rows[i].empty-rows[i-1].empty);
    m[h].d+=Math.max(0,rows[i].defect-rows[i-1].defect);
  }
  // Always return all 24 hours
  return Object.values(m);
}
function calcOEE(rows){
  if(rows.length<2)return{avail:0,perf:0,qual:0,oee:0};
  let ps=0,bd=0,ms=0,op=0;
  const total=(rows[rows.length-1].ts-rows[0].ts)/60000;
  for(let i=1;i<rows.length;i++){
    const dur=(rows[i].ts-rows[i-1].ts)/60000,s=rows[i-1].state;
    if(s===16)ps+=dur;else if(s===1024)bd+=dur;else if(s===2048)ms+=dur;else op+=dur;
  }
  const ppt=total-ps;
  const avail=ppt>0?Math.min(100,Math.max(0,(ppt-bd-ms)/ppt*100)):0;
  const tg=rows[rows.length-1].good-rows[0].good;
  const tout=tg+(rows[rows.length-1].empty-rows[0].empty)+(rows[rows.length-1].defect-rows[0].defect);
  const perf=op>0?Math.min(100,Math.max(0,tout/(35*op)*100)):0;
  const qual=tout>0?Math.min(100,Math.max(0,tg/tout*100)):0;
  return{avail,perf,qual,oee:avail*perf*qual/10000};
}
function calcBDs(rows){
  const out=[];let inBD=false,s=null,sk='';
  for(let i=0;i<rows.length;i++){
    if(rows[i].state===1024&&!inBD){inBD=true;s=rows[i].ts;sk=rows[i].sku;}
    else if(rows[i].state!==1024&&inBD){out.push({start:s,end:rows[i].ts,sku:sk,dur:(rows[i].ts-s)/60000});inBD=false;}
  }
  if(inBD)out.push({start:s,end:rows[rows.length-1].ts,sku:sk,dur:(rows[rows.length-1].ts-s)/60000});
  return out;
}
// Normalise state codes to canonical display state
// 1 and 256 = Operating; 128 = Minor Stop (yellow); 2 and 512 = Changeover
function normState(s){ 
  if([1,256].includes(s)) return 1;    // Operating
  if([2,512].includes(s)) return 2;    // Changeover
  return s;                            // 128, 16, 1024, 2048 kept as-is
}

function stateSegs(rows,a,b){
  const f=rows.filter(r=>r.ts>=a&&r.ts<=b);
  if(!f.length)return[];
  const out=[];
  let cs=normState(f[0].state), ct=f[0].ts, csku=f[0].sku;
  for(let i=1;i<f.length;i++){
    const ns=normState(f[i].state);
    // Only split if normalised state OR sku changes
    if(ns!==cs || f[i].sku!==csku){
      out.push({state:cs,start:ct,end:f[i].ts,sku:csku});
      cs=ns; ct=f[i].ts; csku=f[i].sku;
    }
  }
  out.push({state:cs,start:ct,end:f[f.length-1].ts,sku:csku});
  return out;
}
function makeWeekRows(){
  // Use real data if we have multiple dates; otherwise simulate
  const dates=[...new Set(ROWS.map(r=>localDate(r.ts)))].sort();
  if(dates.length>1){
    // Tag each row with its actual date label (e.g. "May 20")
    return ROWS.map(r=>{
      const d=localDate(r.ts);
      const dt=new Date(d+'T00:00:00');
      const lbl=dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      return{...r,day:lbl,dateStr:d};
    });
  }
  // Single day: simulate across 7 days
  const base=new Date('2026-05-18'),out=[];
  for(let d=0;d<7;d++){
    const f=SEEDS[d],dd=new Date(base);dd.setDate(base.getDate()+d);
    ROWS.forEach(r=>{
      const t=new Date(dd);t.setHours(r.ts.getHours(),r.ts.getMinutes(),r.ts.getSeconds());
      out.push({...r,ts:t,good:Math.round(r.good*f),empty:Math.round(r.empty*f),defect:Math.round(r.defect*f),day:DAYS[d]});
    });
  }
  return out;
}

// ═══════════════════════════════════════════════════════
//  CANVAS CHART DRAWING (no library)
// ═══════════════════════════════════════════════════════
const _barHits = {};

// Unified canvas hover handler — reads from _barHits[el.id]
function bindCanvasHover(el) {
  if (el._hoverBound) return;
  el._hoverBound = true;
  el.addEventListener('mousemove', function(e) {
    const rect = el.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (el.width / rect.width);
    const my = (e.clientY - rect.top) * (el.height / rect.height);
    const hits = _barHits[el.id] || [];
    let found = null;
    for (const h of hits) { if (mx>=h.x1&&mx<=h.x2&&my>=h.y1&&my<=h.y2){found=h;break;} }
    const tip = document.getElementById('tip');
    if (found) {
      const lines = found.values.filter(v=>v.v>0).map(v=>
        '<span style="display:inline-block;width:9px;height:9px;border-radius:2px;background:'+v.color+';margin-right:6px;vertical-align:middle"></span>'+
        '<span style="opacity:.7">'+v.name+':</span> <b>'+v.v.toLocaleString()+(v.pct?'%':'')+'</b>'
      ).join('<br>');
      const total = found.total!=null ? '<hr style="border:none;border-top:1px solid rgba(255,255,255,.15);margin:5px 0"><span style="opacity:.6">Total: <b>'+found.total.toLocaleString()+'</b></span>' : '';
      tip.innerHTML = '<div style="font-weight:700;margin-bottom:5px">'+found.label+'</div>'+lines+total;
      tip.style.display='block';
      tip.style.left=(e.clientX+14)+'px';
      tip.style.top=(e.clientY-40)+'px';
      el.style.cursor='crosshair';
    } else {
      tip.style.display='none';
      el.style.cursor='default';
    }
  });
  el.addEventListener('mouseleave', function() {
    document.getElementById('tip').style.display='none';
  });
}

function drawStackedBar(canvasId, labels, datasets, opts={}) {
  const el = document.getElementById(canvasId);
  if (!el) return;
  const W = el.offsetWidth || el.parentElement.offsetWidth || 800;
  const H = el.offsetHeight || 220;
  el.width = W; el.height = H;
  const ctx = el.getContext('2d');
  const dark = D();
  const PAD = {top:16, right:16, bottom:36, left:60};
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;
  const n = labels.length;
  const gap = 3;
  const barW = Math.max(4, (cW - gap*(n+1)) / n);
  const totals = labels.map((_,i) => datasets.reduce((s,ds)=>s+(ds.data[i]||0),0));
  const maxV = Math.max(...totals, 1);
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle = dark ? '#334155' : '#e2e8f0';
  ctx.lineWidth = 1;
  for (let i=0; i<=4; i++) {
    const y = PAD.top + cH - (i/4)*cH;
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(PAD.left+cW, y); ctx.stroke();
    ctx.fillStyle = dark?'#64748b':'#94a3b8';
    ctx.font = '11px system-ui'; ctx.textAlign = 'right';
    ctx.fillText(Math.round((i/4)*maxV).toLocaleString(), PAD.left-6, y+4);
  }
  const hits = [];
  _barHits[canvasId] = hits;
  labels.forEach((lbl, i) => {
    const x = PAD.left + gap + i*(barW+gap);
    let stackY = PAD.top + cH;
    datasets.forEach(ds => {
      const v = ds.data[i] || 0;
      if (v <= 0) return;
      const bH = (v/maxV)*cH;
      ctx.fillStyle = ds.color;
      ctx.fillRect(x, stackY-bH, barW, bH);
      stackY -= bH;
    });
    hits.push({x1:x, x2:x+barW, y1:PAD.top, y2:PAD.top+cH,
      label:lbl, total:totals[i],
      values:datasets.map(ds=>({name:ds.label,color:ds.color,v:ds.data[i]||0}))});
    if (n <= 12 || i % 2 === 0) {
      ctx.fillStyle = dark?'#64748b':'#94a3b8';
      ctx.font = '10px system-ui'; ctx.textAlign = 'center';
      ctx.fillText(lbl, x+barW/2, PAD.top+cH+16);
    }
  });
  bindCanvasHover(el);
}

function drawGroupedBar(canvasId, labels, datasets) {
  const el = document.getElementById(canvasId);
  if (!el) return;
  const W = el.offsetWidth || el.parentElement.offsetWidth || 800;
  const H = el.offsetHeight || 240;
  el.width = W; el.height = H;
  const ctx = el.getContext('2d');
  const dark = D();
  const PAD = {top:16, right:16, bottom:36, left:46};
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top - PAD.bottom;
  const n = labels.length, ds = datasets.length;
  const grpW = cW/n, barW = Math.max(3,(grpW-8)/ds), gap2 = 2;
  const maxV = Math.max(...datasets.flatMap(d=>d.data), 1);
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle = dark?'#334155':'#e2e8f0';
  ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=PAD.top+cH-(i/4)*cH;
    ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();
    ctx.fillStyle=dark?'#64748b':'#94a3b8';
    ctx.font='11px system-ui';ctx.textAlign='right';
    ctx.fillText(Math.round(i/4*maxV)+'%',PAD.left-4,y+4);
  }
  const hits=[];
  _barHits[canvasId]=hits;
  labels.forEach((lbl,i)=>{
    const gx=PAD.left+i*grpW+4;
    const grpHits={label:lbl, values:[]};
    datasets.forEach((d,j)=>{
      const v=d.data[i]||0,bH=(v/maxV)*cH;
      const bx=gx+j*(barW+gap2);
      ctx.fillStyle=d.color;
      ctx.fillRect(bx,PAD.top+cH-bH,barW,bH);
      grpHits.values.push({name:d.label,color:d.color,v});
    });
    hits.push({x1:PAD.left+i*grpW, x2:PAD.left+(i+1)*grpW,
               y1:PAD.top, y2:PAD.top+cH,
               label:lbl, values:grpHits.values, total:null});
    ctx.fillStyle=dark?'#64748b':'#94a3b8';
    ctx.font='11px system-ui';ctx.textAlign='center';
    ctx.fillText(lbl,PAD.left+i*grpW+grpW/2,PAD.top+cH+16);
  });
  // legend
  let lx=PAD.left;
  datasets.forEach(d=>{
    ctx.fillStyle=d.color; ctx.fillRect(lx,6,10,10);
    ctx.fillStyle=dark?'#94a3b8':'#64748b';
    ctx.font='11px system-ui';ctx.textAlign='left';
    ctx.fillText(d.label,lx+14,16);
    lx+=ctx.measureText(d.label).width+30;
  });
  bindCanvasHover(el);
}

function drawWaterfall(canvasId, oee) {
  const el = document.getElementById(canvasId);
  if (!el) return;
  const W = el.offsetWidth || el.parentElement.offsetWidth || 800;
  const H = el.offsetHeight || 200;
  el.width = W; el.height = H;
  const ctx = el.getContext('2d');
  const dark = D();
  const PAD={top:16,right:16,bottom:36,left:48};
  const cW=W-PAD.left-PAD.right, cH=H-PAD.top-PAD.bottom;
  const {avail,perf,qual,oee:ov}=oee;
  const aL=+(100-avail).toFixed(1);
  const pL=+(avail-avail*perf/100).toFixed(1);
  const qL=+(avail*perf/100-ov).toFixed(1);
  const bars=[
    {lbl:'Available',base:0,h:100,c:'#3b82f6'},
    {lbl:'Avail Loss',base:+(100-aL).toFixed(1),h:aL,c:'#ef4444'},
    {lbl:'Perf Loss',base:+(avail-pL).toFixed(1),h:pL,c:'#f97316'},
    {lbl:'Qual Loss',base:+(avail*perf/100-qL).toFixed(1),h:qL,c:'#f59e0b'},
    {lbl:'OEE',base:0,h:+ov.toFixed(1),c:ov>=65?'#22c55e':ov>=45?'#f59e0b':'#ef4444'},
  ];
  ctx.clearRect(0,0,W,H);
  const n=bars.length, barW=Math.min(80,(cW-n*8)/n);
  ctx.strokeStyle=dark?'#334155':'#e2e8f0'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=PAD.top+cH-(i/4)*cH;
    ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();
    ctx.fillStyle=dark?'#64748b':'#94a3b8';ctx.font='11px system-ui';ctx.textAlign='right';
    ctx.fillText((i/4*100).toFixed(0)+'%',PAD.left-4,y+4);
  }
  const hits=[];
  _barHits[canvasId]=hits;
  bars.forEach((b,i)=>{
    const x=PAD.left+i*(cW/n)+(cW/n-barW)/2;
    const by=PAD.top+cH-(b.base+b.h)/100*cH;
    const bh=b.h/100*cH;
    ctx.fillStyle=b.c; ctx.fillRect(x,by,barW,Math.max(2,bh));
    ctx.fillStyle=dark?'#e2e8f0':'#0f172a';
    ctx.font='bold 11px system-ui';ctx.textAlign='center';
    if(bh>16)ctx.fillText(b.h.toFixed(1)+'%',x+barW/2,by+bh/2+4);
    ctx.fillStyle=dark?'#64748b':'#94a3b8';
    ctx.font='11px system-ui';
    ctx.fillText(b.lbl,x+barW/2,PAD.top+cH+16);
    hits.push({x1:x,x2:x+barW,y1:PAD.top,y2:PAD.top+cH,
               label:b.lbl,
               values:[{name:b.lbl,color:b.c,v:b.h,pct:true}],
               total:null});
  });
  bindCanvasHover(el);
}

function drawPareto(canvasId, pareto) {
  const el = document.getElementById(canvasId);
  if(!el) return;
  const W=el.offsetWidth||el.parentElement.offsetWidth||800;
  const H=el.offsetHeight||260;
  el.width=W; el.height=H;
  const ctx=el.getContext('2d');
  const dark=D();
  const PAD={top:20,right:56,bottom:36,left:52};
  const cW=W-PAD.left-PAD.right, cH=H-PAD.top-PAD.bottom;
  const n=pareto.length;
  const maxV=pareto[0]?pareto[0].val:1;
  const barW=Math.max(20,(cW-n*4)/n);
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle=dark?'#334155':'#e2e8f0'; ctx.lineWidth=1;
  for(let i=0;i<=4;i++){
    const y=PAD.top+cH-(i/4)*cH;
    ctx.beginPath();ctx.moveTo(PAD.left,y);ctx.lineTo(PAD.left+cW,y);ctx.stroke();
    ctx.fillStyle=dark?'#64748b':'#94a3b8';ctx.font='11px system-ui';ctx.textAlign='right';
    ctx.fillText(Math.round(i/4*maxV).toLocaleString(),PAD.left-4,y+4);
  }
  // bars
  const hits=[];
  _barHits[canvasId]=hits;
  pareto.forEach((p,i)=>{
    const x=PAD.left+i*(cW/n)+(cW/n-barW)/2;
    const bh=(p.val/maxV)*cH;
    ctx.fillStyle='#0ea5e9';
    ctx.fillRect(x,PAD.top+cH-bh,barW,bh);
    ctx.fillStyle=dark?'#64748b':'#94a3b8';ctx.font='11px system-ui';ctx.textAlign='center';
    ctx.fillText(p.sku,x+barW/2,PAD.top+cH+16);
    hits.push({x1:x,x2:x+barW,y1:PAD.top,y2:PAD.top+cH,
               label:p.sku,
               values:[{name:'Good Bags',color:'#0ea5e9',v:p.val},
                       {name:'Cumulative',color:'#ef4444',v:p.cp,pct:true}],
               total:null});
  });
  // cumulative line
  ctx.strokeStyle='#ef4444'; ctx.lineWidth=2; ctx.beginPath();
  pareto.forEach((p,i)=>{
    const x=PAD.left+i*(cW/n)+cW/n/2;
    const y=PAD.top+cH-(p.cp/100)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    ctx.fillStyle='#ef4444'; ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); if(i===0)ctx.moveTo(x,y);else{ctx.moveTo(pareto[i-1]?PAD.left+(i-1)*(cW/n)+cW/n/2:x,PAD.top+cH-(pareto[i-1]?pareto[i-1].cp:p.cp)/100*cH);ctx.lineTo(x,y);}
    ctx.stroke();
  });
  // 80% line on right axis
  const y80=PAD.top+cH-0.8*cH;
  ctx.setLineDash([6,4]); ctx.strokeStyle='#ef4444'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(PAD.left,y80);ctx.lineTo(PAD.left+cW,y80);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#ef4444';ctx.font='11px system-ui';ctx.textAlign='left';
  ctx.fillText('80%',PAD.left+cW+4,y80+4);
  // right axis labels
  for(let i=0;i<=4;i++){
    const y=PAD.top+cH-(i/4)*cH;
    ctx.fillStyle=dark?'#64748b':'#94a3b8';ctx.font='11px system-ui';ctx.textAlign='left';
    ctx.fillText((i*25)+'%',PAD.left+cW+4,y+4);
  }
  bindCanvasHover(el);
}

function ganttBlock(rows,date){
  const shifts=[
    {lbl:'00:00–08:00',a:new Date(date+' 00:00:00'),b:new Date(date+' 08:00:00')},
    {lbl:'08:00–16:00',a:new Date(date+' 08:00:00'),b:new Date(date+' 16:00:00')},
    (()=>{const eod=new Date(date+' 16:00:00');eod.setHours(23,59,59,999);return{lbl:'16:00–24:00',a:new Date(date+' 16:00:00'),b:eod};})(),
  ];
  const html = shifts.map((sh,si)=>{
    const segs=stateSegs(rows,sh.a,sh.b);
    const shDur=(sh.b-sh.a)/60000;
    const divs=segs.map(seg=>{
      const off=(seg.start-sh.a)/60000,dur=(seg.end-seg.start)/60000;
      if(dur<=0)return'';
      const x=(off/shDur)*100,w=Math.max(.2,(dur/shDur)*100);
      const{n,c}=sInfo(seg.state);
      // Store tooltip data as data-attributes — no inline HTML quoting issues
      const dsku = (seg.state===1 && seg.sku) ? seg.sku : '';
      const dstate = n;
      const dtime  = fT(seg.start)+' – '+fT(seg.end);
      const ddur   = Math.round(dur)+' min';
      // Mark editable states (Breakdown=1024, Changeover=2, PlannedStop=16)
      const editable=[1024,2,16].includes(seg.state);
      const segIdx=ROWS.findIndex(r=>r.ts>=seg.start&&r.ts<seg.end&&normState(r.state)===seg.state);
      return`<div class="gseg${editable?' editable':''}"
        style="left:${x}%;width:${w}%;background:${c}"
        data-sku="${dsku}"
        data-state="${dstate}"
        data-time="${dtime}"
        data-dur="${ddur}"
        data-seg-start="${seg.start.getTime()}"
        data-seg-end="${seg.end.getTime()}"
        data-seg-state="${seg.state}"
        onmouseleave="hideTip()"
        ${editable?`onclick="openSegPopup(event,this)"`:''}>
      </div>`;
    }).join('');
    const cid='spd_'+date.replace(/-/g,'')+'_'+si;
    return`<div class="gantt-block">
      <div class="gantt-row"><div class="glbl">${sh.lbl}</div><div class="gtrack">${divs}</div></div>
      <div class="speed-row"><div class="speed-lbl">speed</div><div class="speed-canvas-wrap"><canvas id="${cid}" width="800" height="36" style="width:100%;height:36px;display:block;"></canvas></div></div>
    </div>`;
  }).join('');
  // Schedule sparkline drawing after DOM update
  setTimeout(()=>shifts.forEach((sh,si)=>{
    const cid='spd_'+date.replace(/-/g,'')+'_'+si;
    drawSpeedSparkline(cid, rows, sh.a, sh.b);
  }),0);
  return html;
}

function drawSpeedSparkline(canvasId, rows, shiftStart, shiftEnd){
  const el=document.getElementById(canvasId);
  if(!el)return;
  const W=el.offsetWidth||el.parentElement.offsetWidth||800;
  const H=36;
  el.width=W; el.height=H;
  const ctx=el.getContext('2d');
  const dark=D();
  // Filter rows in this shift window
  const pts=rows.filter(r=>r.ts>=shiftStart&&r.ts<=shiftEnd);
  if(pts.length<2){ctx.clearRect(0,0,W,H);return;}
  const shDurMs=shiftEnd-shiftStart;
  const maxSpeed=Math.max(...pts.map(p=>p.speed),1);
  const PAD={top:4,bottom:4,left:0,right:0};
  const cW=W-PAD.left-PAD.right;
  const cH=H-PAD.top-PAD.bottom;
  ctx.clearRect(0,0,W,H);
  // Baseline
  ctx.strokeStyle=dark?'#1e3a2a':'#d1fae5';
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(PAD.left,PAD.top+cH);
  ctx.lineTo(PAD.left+cW,PAD.top+cH);
  ctx.stroke();
  // Fill under line
  const grad=ctx.createLinearGradient(0,PAD.top,0,PAD.top+cH);
  grad.addColorStop(0,'rgba(34,197,94,0.35)');
  grad.addColorStop(1,'rgba(34,197,94,0.02)');
  ctx.fillStyle=grad;
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=PAD.left+((p.ts-shiftStart)/shDurMs)*cW;
    const y=PAD.top+cH-(p.speed/maxSpeed)*cH;
    i===0?ctx.moveTo(x,PAD.top+cH):0;
    ctx.lineTo(x,y);
  });
  const lastX=PAD.left+((pts[pts.length-1].ts-shiftStart)/shDurMs)*cW;
  ctx.lineTo(lastX,PAD.top+cH);
  ctx.closePath();
  ctx.fill();
  // Line
  ctx.strokeStyle='#22c55e';
  ctx.lineWidth=1.5;
  ctx.lineJoin='round';
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=PAD.left+((p.ts-shiftStart)/shDurMs)*cW;
    const y=PAD.top+cH-(p.speed/maxSpeed)*cH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  // Max speed label top-right
  ctx.fillStyle=dark?'#4ade80':'#16a34a';
  ctx.font='9px system-ui';
  ctx.textAlign='right';
  ctx.fillText(maxSpeed+' bg/m',W-2,10);
  // Zero label
  ctx.fillStyle=dark?'#334155':'#94a3b8';
  ctx.fillText('0',W-2,H-2);
  // Hover: show speed value on mousemove
  if(!el._speedBound){
    el._speedBound=true;
    el.addEventListener('mousemove',function(e){
      const rect=el.getBoundingClientRect();
      const mx=(e.clientX-rect.left)*(el.width/rect.width);
      const tAtMouse=new Date(shiftStart.getTime()+((mx/W)*shDurMs));
      // Find closest point
      let best=pts[0],bestDist=Infinity;
      for(const p of pts){const d=Math.abs(p.ts-tAtMouse);if(d<bestDist){bestDist=d;best=p;}}
      showTip(e,'Speed: <b>'+best.speed+' bg/min</b><br>'+fT(best.ts));
    });
    el.addEventListener('mouseleave',hideTip);
  }
}

function showTip(e,html){
  const t=document.getElementById('tip');
  t.innerHTML=html; t.style.display='block';
  t.style.left=(e.clientX+14)+'px'; t.style.top=(e.clientY-40)+'px';
}
function hideTip(){document.getElementById('tip').style.display='none';}
document.addEventListener('mousemove',e=>{
  const t=document.getElementById('tip');
  // Always track tip position
  if(t.style.display==='block'){t.style.left=(e.clientX+14)+'px';t.style.top=(e.clientY-40)+'px';}
  // Gantt segment hover via data-attributes
  const seg=e.target.closest('.gseg[data-state]');
  if(seg){
    const sku=seg.dataset.sku,state=seg.dataset.state,time=seg.dataset.time,dur=seg.dataset.dur;
    let inner='';
    if(sku) inner+=`<span style="display:inline-block;background:#1e40af;color:#bfdbfe;padding:2px 9px;border-radius:4px;font-weight:700;font-size:13px;margin-bottom:4px">${sku}</span><br>`;
    inner+=`<b>${state}</b><br>${time}<br>${dur}`;
    t.innerHTML=inner; t.style.display='block';
  } else if(!e.target.closest('canvas')) {
    // Only hide if not over any canvas (canvases handle their own tips)
    hideTip();
  }
});

let _editSeg = null; // {start, end, state, el}

function openSegPopup(e, el) {
  e.stopPropagation();
  hideTip();
  const segStart = new Date(+el.dataset.segStart);
  const segEnd   = new Date(+el.dataset.segEnd);
  const segState = +el.dataset.segState;
  _editSeg = {start: segStart, end: segEnd, state: segState, el};

  // Update popup label
  const {n} = sInfo(segState);
  document.getElementById('popup-cur-label').textContent =
    n + '  ' + fT(segStart) + ' – ' + fT(segEnd);

  // Init split controls — duration in minutes
  const totalMins = Math.round((segEnd - segStart) / 60000);
  const halfMins  = Math.round(totalMins / 2);
  const minsInput  = document.getElementById('split-mins');
  const slider     = document.getElementById('split-slider');
  const sliderMid  = document.getElementById('split-slider-mid');
  const sliderMax  = document.getElementById('split-slider-max');
  const splitOf    = document.getElementById('split-of');
  if(minsInput)  { minsInput.value = halfMins; minsInput.max = totalMins-1; }
  if(slider)     { slider.max = totalMins-1; slider.value = halfMins; }
  if(sliderMid)  sliderMid.textContent = halfMins;
  if(sliderMax)  sliderMax.textContent = totalMins-1;
  if(splitOf)    splitOf.textContent   = 'of ' + totalMins + ' min total';
  document.getElementById('split-error').style.display='none';

  // Hide reclassify buttons for current state
  document.querySelectorAll('#seg-popup .popup-btn[onclick*="reclassifySeg"]').forEach(b=>{
    const bState = +b.getAttribute('onclick').match(/\d+/)[0];
    b.style.display = (normState(bState)===normState(segState)||bState===segState) ? 'none' : 'flex';
  });

  // Position popup near click, keep inside viewport
  const popup = document.getElementById('seg-popup');
  popup.style.display = 'block';
  const pw=popup.offsetWidth||220, ph=popup.offsetHeight||200;
  let px = e.clientX+10, py = e.clientY+10;
  if(px+pw > window.innerWidth-10)  px = e.clientX-pw-10;
  if(py+ph > window.innerHeight-10) py = e.clientY-ph-10;
  popup.style.left = px+'px';
  popup.style.top  = py+'px';
}

}

function onSplitSlider(val){
  const m=document.getElementById('split-mins');

}

function reclassifySeg(newState){
  if(!_editSeg)return;
  const {start, end} = _editSeg;
  // Update all ROWS in [start, end)
  ROWS.forEach(r=>{ if(r.ts>=start && r.ts<end) r.state=newState; });
  closeSegPopup();
  _WR=null;
  renderDaily();
}

function splitSeg(){
  if(!_editSeg)return;
  const {start, end, state} = _editSeg;
  const errEl = document.getElementById('split-error');
  const minsVal = parseInt(document.getElementById('split-mins').value, 10);
  const totalMins = Math.round((end - start) / 60000);

  if(isNaN(minsVal)||minsVal<1){
    errEl.textContent='Please enter the first-part duration in minutes.';
    errEl.style.display='block'; return;
  }
  if(minsVal>=totalMins){
    errEl.textContent='Duration must be less than '+totalMins+' min (total segment length).';
    errEl.style.display='block'; return;
  }
  errEl.style.display='none';

  // Compute split timestamp = start + minsVal minutes
  const splitTs = new Date(start.getTime() + minsVal*60000);

  // Ensure there's a row at or near splitTs — insert synthetic if needed
  const exactRow = ROWS.find(r=>r.ts.getTime()===splitTs.getTime());
  if(!exactRow){
    // Clone nearest previous row as anchor for the split boundary
    const prevRows = ROWS.filter(r=>r.ts>=start&&r.ts<splitTs);
    if(!prevRows.length){ errEl.textContent='No data before split point.'; errEl.style.display='block'; return; }
    const refRow = prevRows[prevRows.length-1];
    ROWS.push({...refRow, ts: new Date(splitTs), state: 1024});
    ROWS.sort((a,b)=>a.ts-b.ts);
  } else {
    exactRow.state = 1024;
  }

  // Mark second half (splitTs → end) as Breakdown
  ROWS.forEach(r=>{ if(r.ts>=splitTs && r.ts<end) r.state=1024; });

  closeSegPopup();
  _WR=null;
  renderDaily();
}

async function loadDay(date){
  SEL=date;
  let text=null;
  try{ const r=await fetch('/api/rows?date='+date,{cache:'no-store'}); if(r.ok) text=await r.text(); }catch(e){}
  if(text!=null){
    const parsed=parseCSVText(text); parsed.sort((a,b)=>a.ts-b.ts);
    ROWS=parsed; _WR=null; _dataStale=false; renderDaily();
  } else if(ROWS && ROWS.length){
    _dataStale=true; renderDaily();                       // keep last data through the lag
  } else {
    const parsed=parseCSVText(FALLBACK).filter(r=>localDate(r.ts)===date);  // offline first load
    parsed.sort((a,b)=>a.ts-b.ts); ROWS=parsed; _WR=null; _dataStale=true; renderDaily();
  }
}
async function loadWeek(endDate){
  SEL=endDate;
  const end=new Date(endDate+'T00:00:00'), start=new Date(end); start.setDate(end.getDate()-6);
  const frm=localDate(start), to=localDate(end);
  let text=null;
  try{ const r=await fetch(`/api/rows?from=${frm}&to=${to}`,{cache:'no-store'}); if(r.ok) text=await r.text(); }catch(e){}

    const parsed=parseCSVText(FALLBACK); parsed.sort((a,b)=>a.ts-b.ts);

}

function renderWeekly(){
  const wr=WR();
  const allDays=[...new Set(wr.map(r=>r.day))]; // dynamic labels from actual data
  const isReal=allDays.length>1&&wr[0]&&wr[0].dateStr;
  const daily=allDays.map(day=>{
    const dr=wr.filter(r=>r.day===day).sort((a,b)=>a.ts-b.ts);
    let g=0,e=0,d=0;
    for(let i=1;i<dr.length;i++){g+=Math.max(0,dr[i].good-dr[i-1].good);e+=Math.max(0,dr[i].empty-dr[i-1].empty);d+=Math.max(0,dr[i].defect-dr[i-1].defect);}
    const o=calcOEE(dr);
    return{day,g,e,d,avail:+o.avail.toFixed(1),perf:+o.perf.toFixed(1),qual:+o.qual.toFixed(1),oee:+o.oee.toFixed(1)};
  });
  const skuMap={};
  wr.forEach((r,i,a)=>{if(i===0)return;const diff=Math.max(0,r.good-a[i-1].good);if(!skuMap[r.sku])skuMap[r.sku]=0;skuMap[r.sku]+=diff;});
  const pSorted=Object.entries(skuMap).sort((a,b)=>b[1]-a[1]);
  const pTotal=pSorted.reduce((s,[,v])=>s+v,0); let cum=0;
  const pareto=pSorted.map(([sku,val])=>{cum+=val;return{sku,val,cp:+(cum/pTotal*100).toFixed(1)};});
  const wskuMap={};
  allDays.forEach(day=>{
    const dr=wr.filter(r=>r.day===day).sort((a,b)=>a.ts-b.ts);
    skuRuns(dr).forEach(r=>{const k=day+'_'+r.sku;if(!wskuMap[k])wskuMap[k]={day,sku:r.sku,good:0,empty:0,defect:0,dur:0};wskuMap[k].good+=r.good;wskuMap[k].empty+=r.empty;wskuMap[k].defect+=r.defect;wskuMap[k].dur+=r.dur;});
  });
  const wskus=Object.values(wskuMap);
  const wbds=[];
  allDays.forEach(day=>{const dr=wr.filter(r=>r.day===day).sort((a,b)=>a.ts-b.ts);calcBDs(dr).forEach(b=>wbds.push({...b,day}));});

  document.getElementById('main').innerHTML=`

    ${staleBanner()}

      <thead><tr><th>Day</th><th>SKU</th><th>Good Bags</th><th>Empty</th><th>Defect</th><th>Run Time</th></tr></thead>
      <tbody>${wskus.map(r=>`<tr>
        <td style="font-weight:600">${r.day}</td><td style="color:#3b82f6;font-weight:600">${r.sku}</td>
        <td>${r.good.toLocaleString()}</td><td style="color:#f59e0b">${r.empty.toLocaleString()}</td>
        <td style="color:#ef4444">${r.defect.toLocaleString()}</td><td>${fDur(r.dur)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`)}
    ${card(sh('Production Counters — Daily')+
      `<div class="leg">${ld('#22c55e','Good Bags')}${ld('#f59e0b','Empty Bags')}${ld('#ef4444','Defect Bags')}</div>`+cvs('cDaily',240))}
    ${card(sh('OEE by Day')+cvs('cDOEE',240))}
    ${card(sh('Pareto — Good Production by SKU')+cvs('cPareto',260))}
    ${card(sh('Breakdown Log — Full Week')+bdTable(wbds))}
  `;

  requestAnimationFrame(()=>{
    drawStackedBar('cDaily',allDays,[
      {label:'Good',color:'#22c55e',data:daily.map(x=>x.g)},
      {label:'Empty',color:'#f59e0b',data:daily.map(x=>x.e)},
      {label:'Defect',color:'#ef4444',data:daily.map(x=>x.d)},
    ]);
    drawGroupedBar('cDOEE',allDays,[
      {label:'Availability',color:'#3b82f6',data:daily.map(x=>x.avail)},
      {label:'Performance',color:'#f59e0b',data:daily.map(x=>x.perf)},
      {label:'Quality',color:'#22c55e',data:daily.map(x=>x.qual)},
      {label:'OEE',color:'#8b5cf6',data:daily.map(x=>x.oee)},
    ]);
    drawPareto('cPareto',pareto);
  });
}

//  LIVE VIEW  — real-time tiles + rolling speed chart

const POLL_MS = 2000;          // live refresh rate
const WINDOW_SAMPLES = 150;    // 150 × 2s = 5 min of trend
const STATE_LABELS = { 0:"Stopped", 128:"Idle", 256:"Running" };  // edit to match Tag_86

let _buf = [];                 // [{t, speed}]
let _lastLive = null;
let _everLive = false;
let _demo = null;
let _histBootstrapped = false;

function setLiveStatus(kind){

function _tile(lab,id,unit,color){

function paintTiles(d){
  if(!d) return;
  const f=n=>(n==null||isNaN(n))?"—":Math.round(n).toLocaleString();
  const set=(id,v)=>{const e=document.getElementById(id); if(e) e.textContent=v;};
  set('lv_speed',f(d.speed)); set('lv_total',f(d.total));
  set('lv_good',f(d.good)); set('lv_empty',f(d.empty)); set('lv_defect',f(d.defect));
  set('lv_reject',(d.total>0?((d.empty+d.defect)/d.total*100):0).toFixed(1));
  set('lv_sku',d.sku||"—");
  set('lv_state',(d.state in STATE_LABELS)?STATE_LABELS[d.state]:("state code "+d.state));
}

function _record(d){ _buf.push({t:Date.now(),speed:+d.speed||0}); if(_buf.length>WINDOW_SAMPLES) _buf.shift(); }

function drawLiveChart(){
  const cv=document.getElementById('lv_chart'); if(!cv) return;
  const dpr=window.devicePixelRatio||1, w=cv.clientWidth, h=cv.clientHeight;
  cv.width=w*dpr; cv.height=h*dpr;
  const ctx=cv.getContext('2d'); ctx.scale(dpr,dpr); ctx.clearRect(0,0,w,h);
  const ink=getComputedStyle(document.body).color||'#334155';
  const padL=44,padR=12,padT=10,padB=20, x0=padL,x1=w-padR,y0=padT,y1=h-padB;
  let maxV=60; for(const p of _buf) if(p.speed>maxV) maxV=p.speed; maxV=Math.ceil(maxV*1.15/20)*20;
  ctx.font='11px system-ui,sans-serif'; ctx.textBaseline='middle';
  for(let i=0;i<=4;i++){ const gy=y0+(y1-y0)*i/4, v=maxV*(1-i/4);
    ctx.strokeStyle='rgba(127,127,127,.22)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x0,gy); ctx.lineTo(x1,gy); ctx.stroke();
    ctx.fillStyle='rgba(127,127,127,.8)'; ctx.textAlign='start'; ctx.fillText(Math.round(v),8,gy); }
  if(_buf.length<2){ ctx.fillStyle='rgba(127,127,127,.7)'; ctx.textAlign='center';
    ctx.fillText('waiting for data…',(x0+x1)/2,(y0+y1)/2); return; }
  const px=i=>x0+(x1-x0)*(i/(WINDOW_SAMPLES-1)), py=v=>y1-(y1-y0)*(v/maxV);
  ctx.beginPath(); _buf.forEach((p,i)=>{const X=px(i),Y=py(p.speed); i?ctx.lineTo(X,Y):ctx.moveTo(X,Y);});
  ctx.strokeStyle='#3b82f6'; ctx.lineWidth=2; ctx.stroke();
  const n=_buf.length;
  ctx.lineTo(px(n-1),y1); ctx.lineTo(px(0),y1); ctx.closePath(); ctx.fillStyle='rgba(59,130,246,.10)'; ctx.fill();
  ctx.beginPath(); ctx.arc(px(n-1),py(_buf[n-1].speed),3.5,0,7); ctx.fillStyle='#3b82f6'; ctx.fill();
  ctx.textAlign='end'; ctx.fillStyle=ink; ctx.font='13px system-ui,sans-serif';
  ctx.fillText(Math.round(_buf[n-1].speed)+' /min',x1,y0+6);
}

function refreshCam(){
  const img=document.getElementById('lv_cam'); if(!img||VIEW!=='live') return;

function tickDemo(){
  if(!_demo) _demo={good:0,empty:0,defect:0,sku:'331TX'};
  _demo.good += 4+Math.floor(Math.random()*4);
  if(Math.random()<0.15) _demo.empty++; if(Math.random()<0.10) _demo.defect++;
  const total=_demo.good+_demo.empty+_demo.defect;
  const d={sku:_demo.sku,speed:230+Math.round(Math.random()*40),total,
           good:_demo.good,empty:_demo.empty,defect:_demo.defect,state:256,updated_age:0};
  _lastLive=d; _record(d); setLiveStatus('demo');
  if(VIEW==='live'){ paintTiles(d); drawLiveChart(); }
}

async function bootstrapData(){
  setLiveStatus('connecting');
  try{ render(); }catch(e){ console.error('initial render failed', e); }
  pollLive();                                   // first live read now
  setInterval(pollLive, POLL_MS);
  setInterval(()=>{ if(VIEW==='live') refreshCam(); }, 280);   // ~4 fps camera
  await loadDays();   // learn which days exist (cheap) + default to the latest
  // Auto-refresh only the latest day/week; older days are static.
  setInterval(()=>{
    const latest = DAYS_AVAIL[DAYS_AVAIL.length-1];
    if(VIEW==='daily'  && SEL===latest) loadDay(SEL);
    else if(VIEW==='weekly' && SEL===latest) loadWeek(SEL);
  }, 30000);
}

// ── INIT ────────────────────────────────────────────────
bootstrapData();
window.addEventListener('resize',()=>{ if(VIEW==='live') drawLiveChart(); else render(); });
</script>
